name: Invoice Logic Tester

# 定義觸發條件：當 main 分支有 push 時啟動
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # 使用 GitHub 提供的 Ubuntu 虛擬機環境
    runs-on: ubuntu-latest

    steps:
      # 1. 將你的程式碼從 GitHub 倉庫下載到虛擬機
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安裝 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 執行你的發票處理程式
      - name: Run Invoice Processor
        run: |
          python invoice_processor.py